version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: card_grader_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: card_grader
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d card_grader']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: card_grader_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  python-ml:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: card_grader_ml
    ports:
      - '8000:8000'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
